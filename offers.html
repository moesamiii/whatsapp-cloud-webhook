<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إرسال العروض المخصصة</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <link rel="icon" href="/img/dummy-conan.jpeg" type="image/jpeg" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./dashboard.css" />

    <style>
      .settings-container {
        padding: 30px;
        display: flex;
        flex-direction: column;
        gap: 25px;
        max-width: 900px;
        margin: 0 auto;
      }

      .setting-card {
        background: var(--card-bg, #fff);
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        display: flex;
        flex-direction: column;
        gap: 15px;
        transition: background 0.3s;
      }

      body.dark .setting-card {
        background: #2a2a2a;
        color: #fff;
      }

      label {
        font-weight: 600;
        font-size: 15px;
      }

      input,
      textarea,
      select {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
        width: 100%;
      }

      body.dark input,
      body.dark textarea,
      body.dark select {
        background: #3a3a3a;
        color: #fff;
        border-color: #555;
      }

      button {
        background: linear-gradient(270deg, #7c3aed, #a855f7);
        color: #fff;
        border: none;
        padding: 12px 28px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        align-self: center;
        margin-top: 10px;
        transition: opacity 0.3s;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      footer {
        text-align: center;
        padding: 20px;
        font-size: 14px;
        color: #aaa;
      }

      /* ✅ Preview styling for multiple images */
      .images-preview-container {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
      }

      .image-preview-item {
        position: relative;
        width: 120px;
        height: 120px;
      }

      .image-preview {
        width: 100%;
        height: 100%;
        border-radius: 8px;
        object-fit: cover;
        border: 2px solid #ccc;
      }

      .remove-image-btn {
        position: absolute;
        top: -8px;
        right: -8px;
        background: #ff4444;
        color: white;
        border: none;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        cursor: pointer;
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        margin: 0;
      }

      /* ✅ Debug info box */
      .debug-info {
        background: #f0f0f0;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 15px;
        margin-top: 20px;
        font-family: monospace;
        font-size: 12px;
        max-height: 300px;
        overflow-y: auto;
        display: none;
      }

      body.dark .debug-info {
        background: #1a1a1a;
        border-color: #444;
        color: #0f0;
      }

      .debug-info h4 {
        margin-top: 0;
        color: #7c3aed;
      }

      body.dark .debug-info h4 {
        color: #a855f7;
      }

      .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
        margin-left: 10px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .progress-info {
        background: #e0e7ff;
        border: 1px solid #7c3aed;
        border-radius: 8px;
        padding: 12px;
        margin-top: 10px;
        font-weight: 600;
        color: #7c3aed;
        text-align: center;
        display: none;
      }

      body.dark .progress-info {
        background: #2a2a4a;
        color: #a855f7;
      }

      /* ========== PHONE NUMBERS SECTION STYLES ========== */
      .recipients-section {
        background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
        border: 2px solid #22c55e;
        border-radius: 12px;
        padding: 20px;
        margin-top: 10px;
      }

      body.dark .recipients-section {
        background: linear-gradient(135deg, #14532d 0%, #166534 100%);
        border-color: #4ade80;
      }

      .recipients-title {
        font-size: 16px;
        font-weight: 600;
        color: #166534;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      body.dark .recipients-title {
        color: #86efac;
      }

      .add-phone-form {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
        flex-wrap: wrap;
      }

      .add-phone-form input {
        flex: 1;
        min-width: 180px;
      }

      .add-phone-btn {
        background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        padding: 10px 20px;
        font-size: 14px;
        margin: 0;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
      }

      .add-phone-btn:hover {
        background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
      }

      /* ========== LOAD FROM BOOKINGS SECTION ========== */
      .load-section {
        background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
        border: 2px solid #3b82f6;
        border-radius: 12px;
        padding: 15px;
        margin-top: 15px;
      }

      body.dark .load-section {
        background: linear-gradient(135deg, #1e3a5f 0%, #1e40af 100%);
        border-color: #60a5fa;
      }

      .load-section-title {
        font-size: 15px;
        font-weight: 600;
        color: #1e40af;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      body.dark .load-section-title {
        color: #93c5fd;
      }

      .filter-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 12px;
      }

      .filter-row label {
        font-size: 13px;
        font-weight: 500;
        min-width: 80px;
      }

      .filter-row select {
        flex: 1;
        min-width: 200px;
        max-width: 300px;
      }

      .load-buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .load-contacts-btn {
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        padding: 10px 20px;
        font-size: 14px;
        margin: 0;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
      }

      .load-contacts-btn:hover {
        background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
      }

      .load-all-btn {
        background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
        padding: 10px 20px;
        font-size: 14px;
        margin: 0;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
      }

      .load-all-btn:hover {
        background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
      }

      .service-stats {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid rgba(59, 130, 246, 0.3);
      }

      .service-stat-badge {
        background: white;
        border: 1px solid #d1d5db;
        border-radius: 20px;
        padding: 4px 12px;
        font-size: 12px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        transition: all 0.2s;
      }

      body.dark .service-stat-badge {
        background: #374151;
        border-color: #4b5563;
        color: #f3f4f6;
      }

      .service-stat-badge:hover {
        border-color: #3b82f6;
        background: #eff6ff;
      }

      body.dark .service-stat-badge:hover {
        background: #1e40af;
        border-color: #60a5fa;
      }

      .service-stat-badge .count {
        background: #3b82f6;
        color: white;
        border-radius: 10px;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 600;
      }

      /* ========== END LOAD SECTION ========== */

      .phone-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
        max-height: 200px;
        overflow-y: auto;
        padding: 10px;
        background: rgba(255, 255, 255, 0.5);
        border-radius: 8px;
      }

      body.dark .phone-list {
        background: rgba(0, 0, 0, 0.3);
      }

      .phone-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: white;
        border: 1px solid #d1d5db;
        border-radius: 20px;
        padding: 6px 12px;
        font-size: 13px;
        transition: all 0.2s;
      }

      body.dark .phone-tag {
        background: #374151;
        border-color: #4b5563;
        color: #f3f4f6;
      }

      .phone-tag:hover {
        border-color: #ef4444;
      }

      .phone-tag .phone-number {
        font-weight: 500;
        direction: ltr;
        unicode-bidi: embed;
      }

      .phone-tag .phone-name {
        color: #6b7280;
        font-size: 11px;
      }

      body.dark .phone-tag .phone-name {
        color: #9ca3af;
      }

      .phone-tag .phone-service {
        color: #3b82f6;
        font-size: 10px;
        background: #eff6ff;
        padding: 2px 6px;
        border-radius: 4px;
      }

      body.dark .phone-tag .phone-service {
        color: #93c5fd;
        background: #1e3a5f;
      }

      .phone-tag .remove-phone {
        background: #ef4444;
        color: white;
        border: none;
        border-radius: 50%;
        width: 18px;
        height: 18px;
        font-size: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        margin: 0;
        transition: background 0.2s;
      }

      .phone-tag .remove-phone:hover {
        background: #dc2626;
      }

      .phone-count {
        font-size: 13px;
        color: #166534;
        margin-top: 10px;
        font-weight: 500;
      }

      body.dark .phone-count {
        color: #86efac;
      }

      .no-phones-msg {
        text-align: center;
        color: #6b7280;
        font-size: 14px;
        padding: 20px;
      }

      body.dark .no-phones-msg {
        color: #9ca3af;
      }

      .action-buttons-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid rgba(0, 0, 0, 0.1);
        flex-wrap: wrap;
      }

      body.dark .action-buttons-row {
        border-top-color: rgba(255, 255, 255, 0.1);
      }

      .clear-all-btn {
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        padding: 8px 16px;
        font-size: 13px;
        margin: 0;
      }

      .clear-all-btn:hover {
        background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
      }

      /* Toast notification */
      .toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: #22c55e;
        color: white;
        padding: 16px 32px;
        border-radius: 12px;
        font-weight: 600;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        opacity: 0;
        transition: all 0.3s ease;
        z-index: 9999;
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      .toast.error {
        background: #ef4444;
      }

      .toast.warning {
        background: #f59e0b;
      }
    </style>
  </head>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      // 🔑 Supabase configuration
      const SUPABASE_URL = "https://ylsbmxedhycjqaorjkvm.supabase.co";
      const SUPABASE_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlsc2JteGVkaHljanFhb3Jqa3ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA4MTk5NTUsImV4cCI6MjA3NjM5NTk1NX0.W61xOww2neu6RA4yCJUob66p4OfYcgLSVw3m3yttz1E";
      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY,
      );

      // ✅ Global variable to store clinic settings
      let clinicSettings = null;

      let selectedFiles = [];
      let recipientPhones = []; // Array to store phone numbers with names
      let allBookings = []; // Store all bookings for filtering

      // ✅ Load clinic settings from database
      async function loadClinicSettings() {
        const { data, error } = await supabaseClient
          .from("clinic_settings")
          .select("*")
          .eq("clinic_id", "default")
          .single();

        if (error) {
          console.error("Error loading clinic settings:", error);
          return;
        }

        clinicSettings = data;
        applyClinicSettings();
      }

      // ✅ Apply clinic settings to the UI
      function applyClinicSettings() {
        if (!clinicSettings) return;

        const clinicName = clinicSettings.clinic_name || "CLINIC DASHBOARD";

        // Update sidebar logo
        const sidebarClinicName = document.getElementById("sidebarClinicName");
        if (sidebarClinicName) {
          sidebarClinicName.textContent =
            clinicName.toUpperCase() + " DASHBOARD";
        }

        // Update footer
        const footerText = document.getElementById("footerText");
        if (footerText) {
          const currentYear = new Date().getFullYear();
          footerText.textContent = `© ${currentYear} ${clinicName}`;
        }

        // Update page title
        document.title = "إرسال العروض المخصصة - " + clinicName;
      }

      // Show toast notification
      function showToast(message, type = "success") {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.className = "toast show";
        if (type === "error") toast.classList.add("error");
        if (type === "warning") toast.classList.add("warning");
        setTimeout(() => {
          toast.className = "toast";
        }, 3000);
      }

      // 🔍 Debug helper
      function addDebugLog(message, type = "info") {
        const debugContent = document.getElementById("debugContent");
        const debugInfo = document.getElementById("debugInfo");
        debugInfo.style.display = "block";

        const timestamp = new Date().toLocaleTimeString("ar-EG");
        const icon = type === "error" ? "❌" : type === "success" ? "✅" : "ℹ️";

        debugContent.innerHTML += `<div>[${timestamp}] ${icon} ${message}</div>`;
        debugContent.scrollTop = debugContent.scrollHeight;
        console.log(`[${timestamp}] ${message}`);
      }

      function updateProgress(message) {
        const progressInfo = document.getElementById("progressInfo");
        progressInfo.style.display = "block";
        progressInfo.textContent = message;
      }

      // ========== LOAD BOOKINGS AND POPULATE FILTERS ==========

      async function loadBookingsData() {
        try {
          const { data, error } = await supabaseClient
            .from("bookings")
            .select("*")
            .order("time", { ascending: false });

          if (error) throw error;

          allBookings = data || [];
          populateServiceFilter();
          updateServiceStats();

          addDebugLog(`تم تحميل ${allBookings.length} حجز من قاعدة البيانات`);
        } catch (err) {
          console.error("Error loading bookings:", err);
          addDebugLog(`خطأ في تحميل الحجوزات: ${err.message}`, "error");
        }
      }

      // Populate service filter dropdown
      function populateServiceFilter() {
        const serviceFilter = document.getElementById("serviceFilter");
        const services = [
          ...new Set(allBookings.map((b) => b.service).filter(Boolean)),
        ];

        // Keep the "all" option and add services
        serviceFilter.innerHTML = '<option value="all">جميع الخدمات</option>';

        services.forEach((service) => {
          const option = document.createElement("option");
          option.value = service;
          option.textContent = service;
          serviceFilter.appendChild(option);
        });
      }

      // Update service stats badges
      function updateServiceStats() {
        const statsContainer = document.getElementById("serviceStats");
        const serviceCounts = {};

        allBookings.forEach((b) => {
          if (b.service) {
            serviceCounts[b.service] = (serviceCounts[b.service] || 0) + 1;
          }
        });

        const sortedServices = Object.entries(serviceCounts).sort(
          (a, b) => b[1] - a[1],
        );

        statsContainer.innerHTML = sortedServices
          .map(
            ([service, count]) => `

      // Quick filter by clicking on service badge
      function quickFilterService(service) {
        document.getElementById("serviceFilter").value = service;
        loadFilteredBookings();
      }

      // ========== PHONE NUMBER MANAGEMENT ==========

      // Add phone number to list
      function addPhoneNumber() {
        const phoneInput = document.getElementById("phoneInput");
        const nameInput = document.getElementById("phoneNameInput");

        let phone = phoneInput.value.trim();
        const name = nameInput.value.trim() || "مستلم";

        if (!phone) {
          showToast("يرجى إدخال رقم الهاتف", "error");
          return;
        }

        // Clean phone number

        phone = phone.replace(/[\s\-\(\)\+]/g, "");

        // Check if already exists
        if (recipientPhones.some((p) => p.phone === phone)) {
          showToast("هذا الرقم موجود بالفعل", "warning");
          return;
        }

        // Add to list
        recipientPhones.push({ phone, name, service: "يدوي" });

        // Clear inputs
        phoneInput.value = "";
        nameInput.value = "";

        // Update UI
        renderPhoneList();
        showToast("تم إضافة الرقم بنجاح");
        addDebugLog(`تم إضافة رقم يدوياً: ${phone} (${name})`);
      }

      // Remove phone number from list
      function removePhone(index) {
        const removed = recipientPhones.splice(index, 1)[0];
        renderPhoneList();
        addDebugLog(`تم إزالة رقم: ${removed.phone}`);
      }

      // Clear all phone numbers
      function clearAllPhones() {
        if (recipientPhones.length === 0) return;

        if (confirm("هل أنت متأكد من مسح جميع الأرقام؟")) {
          recipientPhones = [];
          renderPhoneList();
          showToast("تم مسح جميع الأرقام");
          addDebugLog("تم مسح جميع الأرقام");
        }
      }

      // Render phone list UI
      function renderPhoneList() {
        const phoneList = document.getElementById("phoneList");
        const phoneCount = document.getElementById("phoneCount");

        if (recipientPhones.length === 0) {
          phoneList.innerHTML = `
            <div class="no-phones-msg">
              <i class="fa-solid fa-phone-slash"></i>
              لم يتم إضافة أي أرقام بعد
            </div>
          `;
        } else {
          phoneList.innerHTML = recipientPhones
            .map(
              (p, index) => `
            <div class="phone-tag">
              <span class="phone-number">${p.phone}</span>
              <span class="phone-name">${p.name}</span>
              ${
                p.service && p.service !== "يدوي"
                  ? `<span class="phone-service">${p.service}</span>`
                  : ""
              }
              <button class="remove-phone" onclick="removePhone(${index})">×</button>
            </div>
          `,
            )
            .join("");
        }

        phoneCount.innerHTML = `عدد المستلمين: <strong>${recipientPhones.length}</strong>`;
      }

      // ========== LOAD CONTACTS FUNCTIONS ==========

      // Load filtered bookings
      async function loadFilteredBookings() {
        const serviceFilter = document.getElementById("serviceFilter").value;
        const statusFilter = document.getElementById("statusFilter").value;

        updateProgress("جاري تحميل الحجوزات...");

        try {
          let filtered = [...allBookings];

          // Apply service filter
          if (serviceFilter !== "all") {
            filtered = filtered.filter((b) => b.service === serviceFilter);
          }

          // Apply status filter
          if (statusFilter !== "all") {
            filtered = filtered.filter((b) => b.status === statusFilter);
          }

          // Add to recipients (avoid duplicates)
          const existingPhones = new Set(recipientPhones.map((p) => p.phone));
          let addedCount = 0;

          filtered.forEach((b) => {
            if (b.phone && !existingPhones.has(b.phone)) {
              existingPhones.add(b.phone);
              recipientPhones.push({
                phone: b.phone,
                name: b.name || "مستلم",
                service: b.service || "",
              });
              addedCount++;
            }
          });

          renderPhoneList();

          if (addedCount > 0) {
            showToast(`تم إضافة ${addedCount} جهة اتصال`);
            addDebugLog(
              `تم تحميل ${addedCount} جهة اتصال (خدمة: ${serviceFilter}, حالة: ${statusFilter})`,
              "success",
            );
          } else {
            showToast("لا توجد جهات اتصال جديدة للإضافة", "warning");
          }
        } catch (err) {
          console.error("Error:", err);
          showToast("خطأ في تحميل جهات الاتصال", "error");
        } finally {
          document.getElementById("progressInfo").style.display = "none";
        }
      }

      // Load all contacts (bookings + contact list)
      async function loadAllContacts() {
        updateProgress("جاري تحميل جميع جهات الاتصال...");

        try {
          // Load from bookings
          const { data: bookingData, error: bookingError } =
            await supabaseClient
              .from("bookings")
              .select("name, phone, service");

          // Load from contact_list
          const { data: contactData, error: contactError } =
            await supabaseClient.from("contact_list").select("name, phone");

          if (bookingError || contactError) {
            throw bookingError || contactError;
          }

          // Combine and remove duplicates
          const existingPhones = new Set(recipientPhones.map((p) => p.phone));
          let addedCount = 0;

          // Add from bookings
          (bookingData || []).forEach((b) => {
            if (b.phone && !existingPhones.has(b.phone)) {
              existingPhones.add(b.phone);
              recipientPhones.push({
                phone: b.phone,
                name: b.name || "مستلم",
                service: b.service || "",
              });
              addedCount++;
            }
          });

          // Add from contact list
          (contactData || []).forEach((c) => {
            if (c.phone && !existingPhones.has(c.phone)) {
              existingPhones.add(c.phone);
              recipientPhones.push({
                phone: c.phone,
                name: c.name || "مستلم",
                service: "قائمة التواصل",
              });
              addedCount++;
            }
          });

          renderPhoneList();

          if (addedCount > 0) {
            showToast(`تم إضافة ${addedCount} جهة اتصال`);
            addDebugLog(
              `تم تحميل ${addedCount} جهة اتصال من جميع المصادر`,
              "success",
            );
          } else {
            showToast("جميع جهات الاتصال موجودة مسبقاً", "warning");
          }
        } catch (err) {
          console.error("Error:", err);
          showToast("خطأ في تحميل جهات الاتصال", "error");
          addDebugLog(`خطأ: ${err.message}`, "error");
        } finally {
          document.getElementById("progressInfo").style.display = "none";
        }
      }

      // Load only from contact list

          } else {
            showToast("لا توجد جهات اتصال جديدة للإضافة", "warning");

        } catch (err) {

      function logout() {
        localStorage.removeItem("clinic_logged_in");
        document.getElementById("loginScreen").style.display = "flex";
        document.getElementById("dashboardContent").style.display = "none";
      }

      if (localStorage.getItem("clinic_logged_in") === "true") {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("dashboardContent").style.display = "block";
        loadClinicSettings(); // ✅ Load settings on startup
        loadBookingsData(); // Load bookings on page load
      }

      // 🌙 Theme toggle
      const themeToggle = document.getElementById("themeToggle");
      themeToggle.addEventListener("click", function () {
        document.body.classList.toggle("dark");
        const icon = themeToggle.querySelector("i");
        if (document.body.classList.contains("dark")) {
          icon.classList.replace("fa-moon", "fa-sun");
          localStorage.setItem("clinic_theme", "dark");
        } else {
          icon.classList.replace("fa-sun", "fa-moon");
          localStorage.setItem("clinic_theme", "light");
        }
      });
      if (localStorage.getItem("clinic_theme") === "dark") {
        document.body.classList.add("dark");
        const icon = themeToggle.querySelector("i");
        icon.classList.replace("fa-moon", "fa-sun");
      }

      // 🖼️ Preview multiple images
      const offerImage = document.getElementById("offerImage");
      const imagesPreviewContainer = document.getElementById(
        "imagesPreviewContainer",
      );

      offerImage.addEventListener("change", () => {
        selectedFiles = Array.from(offerImage.files);
        renderImagePreviews();
        addDebugLog(`تم اختيار ${selectedFiles.length} صورة`);
      });

      function renderImagePreviews() {
        imagesPreviewContainer.innerHTML = "";

        selectedFiles.forEach((file, index) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const div = document.createElement("div");
            div.className = "image-preview-item";
            div.innerHTML = `
              <img src="${e.target.result}" class="image-preview" alt="صورة ${
                index + 1
              }">
              <button class="remove-image-btn" onclick="removeImage(${index})">×</button>
            `;
            imagesPreviewContainer.appendChild(div);
          };
          reader.readAsDataURL(file);
        });
      }

      function removeImage(index) {
        selectedFiles.splice(index, 1);
        renderImagePreviews();
        addDebugLog(`تم إزالة صورة. المتبقي: ${selectedFiles.length} صورة`);
      }

      // 🚀 Upload single image to Supabase
      async function uploadImage(file) {
        try {
          addDebugLog(`بدء رفع الصورة: ${file.name}`);

          const uniqueName = `${Date.now()}_${Math.random()
            .toString(36)
            .substr(2, 9)}_${file.name}`;
          const { data, error } = await supabaseClient.storage
            .from("offers")
            .upload(uniqueName, file, {
              cacheControl: "3600",
              upsert: false,
            });

          if (error) {
            addDebugLog(`خطأ في رفع الصورة: ${error.message}`, "error");
            throw error;
          }

          const { data: urlData } = supabaseClient.storage
            .from("offers")
            .getPublicUrl(uniqueName);

          const imageUrl = urlData.publicUrl;
          addDebugLog(`✅ تم رفع الصورة بنجاح: ${file.name}`, "success");

          return imageUrl;
        } catch (err) {
          addDebugLog(
            `خطأ في رفع الصورة ${file.name}: ${err.message}`,
            "error",
          );
          return null;
        }
      }

      function flattenText(text) {
        return String(text)
          .replace(/[\r\n\t]/g, " ")
          .replace(/ {2,}/g, " ")
          .trim();
      }

      function getSmartDelay(index) {
        // Random delay between 4–8 seconds
        const baseDelay = 4000 + Math.random() * 4000;

        // Every 10 messages → longer break (20–40 seconds)
        if ((index + 1) % 10 === 0) {
          const cooldown = 20000 + Math.random() * 20000;
          return cooldown;
        }

        return baseDelay;
      }
      // 🚀 Main send offer function
      async function sendOffer() {
        const sendBtn = document.getElementById("sendBtn");
        const text = document.getElementById("offerText").value.trim();
        const date = document.getElementById("offerDate").value;

        // Clear previous debug logs
        document.getElementById("debugContent").innerHTML = "";
        document.getElementById("debugInfo").style.display = "block";
        document.getElementById("progressInfo").style.display = "none";

        if (!text || !date) {
          alert("⚠️ يرجى تعبئة جميع الحقول قبل الإرسال.");
          addDebugLog("فشل: حقول مفقودة", "error");
          return;
        }

        // Check if there are recipients
        if (recipientPhones.length === 0) {
          alert("⚠️ يرجى إضافة رقم هاتف واحد على الأقل للإرسال.");
          addDebugLog("فشل: لا توجد أرقام مستلمين", "error");
          return;
        }

        // Disable button during send
        sendBtn.disabled = true;
        sendBtn.innerHTML = 'جاري الإرسال... <span class="spinner"></span>';

        try {
          let totalSuccess = 0;
          let totalFail = 0;

          // Upload images first if any
          let uploadedImageUrls = [];

          // AFTER (preserves line breaks):
          // AFTER:
          const mainText = text.trim();

          if (selectedFiles.length > 0) {
            addDebugLog(`بدء رفع ${selectedFiles.length} صورة...`);

            for (let i = 0; i < selectedFiles.length; i++) {
              updateProgress(
                `جاري رفع الصورة ${i + 1} من ${selectedFiles.length}...`,
              );
              const imageUrl = await uploadImage(selectedFiles[i]);
              if (imageUrl) {
                uploadedImageUrls.push(imageUrl);
              }
            }

            addDebugLog(
              `تم رفع ${uploadedImageUrls.length} صورة بنجاح`,
              "success",
            );
          }

          // Send to each recipient
          const totalRecipients = recipientPhones.length;

          for (let i = 0; i < recipientPhones.length; i++) {
            const recipient = recipientPhones[i];
            updateProgress(
              `إرسال إلى ${recipient.name} (${i + 1}/${totalRecipients})...`,
            );

            if (uploadedImageUrls.length === 0) {
              const success = await sendWhatsAppMessage(
                recipient.phone,
                mainText,
                date,
                null,
              );

              if (success) totalSuccess++;
              else totalFail++;
            } else {
              for (let j = 0; j < uploadedImageUrls.length; j++) {
                const success = await sendWhatsAppMessage(
                  recipient.phone,
                  mainText,
                  date,
                  uploadedImageUrls[j],
                );
                if (success) totalSuccess++;
                else totalFail++;

                // Wait between messages to avoid rate limiting
                if (j < uploadedImageUrls.length - 1) {
                  const imageDelay = 2000 + Math.random() * 1000; // 2–3 seconds
                  await new Promise((resolve) =>
                    setTimeout(resolve, imageDelay),
                  );
                }
              }
            }

            // Wait between recipients
            // Smart delay between recipients
            if (i < recipientPhones.length - 1) {
              const delay = getSmartDelay(i);

              updateProgress(
                `⏳ انتظار ${(delay / 1000).toFixed(1)} ثانية قبل الإرسال التالي...`,
              );

              await new Promise((resolve) => setTimeout(resolve, delay));
            }
          }

          addDebugLog(
            `✅ اكتمل الإرسال: ${totalSuccess} نجح، ${totalFail} فشل`,
            "success",
          );

          if (totalSuccess > 0) {
            alert(
              `✅ تم إرسال العرض بنجاح!\n📤 نجح: ${totalSuccess}\n❌ فشل: ${totalFail}`,
            );
            clearForm();
          } else {
            alert("❌ فشل إرسال جميع الرسائل");
          }
        } catch (err) {
          console.error("❌ Error sending offer:", err);
          addDebugLog(`خطأ في الإرسال: ${err.message}`, "error");
          alert("❌ خطأ أثناء الإرسال: " + err.message);
        } finally {
          // Re-enable button
          sendBtn.disabled = false;
          sendBtn.innerHTML = "إرسال العرض الآن";
          document.getElementById("progressInfo").style.display = "none";
        }
      }

      function clearForm() {
        document.getElementById("offerText").value = "";
        document.getElementById("offerDate").value = "";
        document.getElementById("offerImage").value = "";
        selectedFiles = [];
        imagesPreviewContainer.innerHTML = "";
        recipientPhones = [];
        renderPhoneList();
      }

      // 📱 Menu toggle for mobile
      const menuToggle = document.getElementById("menuToggle");
      const sidebar = document.getElementById("sidebar");
      if (menuToggle) {
        menuToggle.addEventListener("click", () => {
          sidebar.classList.toggle("active");
        });
      }

      // Initialize phone list on page load
      renderPhoneList();
    </script>

    <script>
      async function importExcel() {
        const fileInput = document.getElementById("excelFile");

        if (!fileInput.files.length) {
          showToast("يرجى اختيار ملف Excel", "error");
          return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function (e) {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: "array" });

          const sheetName = workbook.SheetNames[0];
          const sheet = workbook.Sheets[sheetName];

          const jsonData = XLSX.utils.sheet_to_json(sheet);

          let addedCount = 0;

          jsonData.forEach((row) => {
            let name = row.name || row.Name || row.الاسم || "مستلم";
            let phone =
              row.phone || row.Phone || row.رقم || row.number || row.Number;

            if (!phone) return;

            phone = phone.toString().replace(/[\s\-\(\)\+]/g, "");

            if (!recipientPhones.some((p) => p.phone === phone)) {
              recipientPhones.push({ phone, name });
              addedCount++;
            }
          });

          renderPhoneList();

          if (addedCount > 0) {
            showToast(`تم إضافة ${addedCount} رقم`);
            addDebugLog(`تم استيراد ${addedCount} رقم من Excel`, "success");
          } else {
            showToast("لا توجد أرقام جديدة", "warning");
          }
        };

        reader.readAsArrayBuffer(file);
      }
    </script>
